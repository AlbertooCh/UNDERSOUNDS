{% extends '../base.html' %}
{% load static %}
{% block title %}Novedades - Undersounds{% endblock %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
    }
    .title {
        font-size: 40px;
        font-weight: bold;
        text-align: center;
    }
    .subtitle {
        font-size: 24px;
        text-align: center;
        margin: 20px 0;
        color: #555;
    }
    .cuadrado {
        flex: 1;
        padding-top: 100%;
        width: 17vw;
        height: 17vw;
        display: inline-block;
        margin: 10px;
        padding: 10px;
        box-sizing: border-box;
        text-align: center;
        position: relative;
        overflow: hidden;
        transition: background-color 0.8s ease, filter 0.8s ease;
        animation: fadeIn 0.5s ease forwards;
        opacity: 0;
        border-radius: 15px;
        cursor: pointer;
    }
    .cuadrado:hover {
        background-color: rgba(0, 0, 0, 0.5);
    }
    .cuadrado:hover .song-info {
        display: flex;
    }
    .song-info {
        margin-top: 5px;
        font-size: 1em;
        color: #fff;
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
        flex-direction: column;
        align-items: center;
        width: 90%;
    }
    .catalog {
        flex: 2;
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        padding: 0 50px;
        max-width: 1200px;
        margin: 0 auto;
        background: lightgray;
        border-radius: 15px;
    }
    .cuadrado img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: filter 0.6s ease, background-color 0.6s ease;
        z-index: 1;
        border-radius: 15px;
    }
    .cuadrado:hover img {
        filter: brightness(20%);
    }
    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
    .artist-name {
        font-size: 0.8em;
        margin-top: 5px;
        color: #ccc;
    }
</style>

<div class="titulo"></div>
<h2 class="title">NOVEDADES</h2>
<div class="subtitle">Últimas canciones añadidas</div>

<div id="contenedor" class="catalog"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/api/songs/')  // Usamos el endpoint del SongController
            .then(response => response.json())
            .then(data => {
                // Ordenar por fecha de lanzamiento (más recientes primero)
                const sortedSongs = data.results.sort((a, b) =>
                    new Date(b.release_date) - new Date(a.release_date)
                );
                // Tomar las 15 más recientes
                const recentSongs = sortedSongs.slice(0, 15);
                displaySongs(recentSongs);
            })
            .catch(error => {
                console.error('Error:', error);
                // Fallback por si hay error en la API
                fetch('{% static "music/fallback_songs.json" %}')
                    .then(response => response.json())
                    .then(fallbackData => {
                        const recentSongs = fallbackData.slice(0, 15);
                        displaySongs(recentSongs);
                    });
            });

        function displaySongs(songs) {
            const contenedor = document.getElementById('contenedor');
            contenedor.innerHTML = '';

            songs.forEach((song, index) => {
                const songDiv = document.createElement('div');
                songDiv.className = 'cuadrado';
                songDiv.style.animationDelay = `${index * 0.1}s`;

                const infoDiv = document.createElement('div');
                infoDiv.className = 'song-info';

                const titleP = document.createElement('p');
                titleP.textContent = song.title;

                const artistP = document.createElement('p');
                artistP.className = 'artist-name';
                artistP.textContent = song.artist;

                infoDiv.appendChild(titleP);
                infoDiv.appendChild(artistP);

                const img = document.createElement('img');
                // Usamos el cover del álbum o una imagen por defecto
                img.src = song.album_cover_path || '{% static "music/images/default_cover.jpg" %}';
                img.alt = song.title;
                img.loading = "lazy";

                songDiv.appendChild(infoDiv);
                songDiv.appendChild(img);

                songDiv.addEventListener('click', () => {
                    window.location.href = `/music_detail/${song.id}/`;
                });

                contenedor.appendChild(songDiv);
            });
        }
    });
</script>
{% endblock %}
